<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TicketRush - Đăng nhập</title>
    <style>
        :root { --bg:#0b1220; --card:#111b31; --text:#e7eefc; --muted:#9db0d3; --accent:#5eead4; --danger:#fb7185; }
        body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: radial-gradient(1200px 600px at 10% 10%, #172554 0%, var(--bg) 55%), var(--bg); color:var(--text); }
        .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:28px; }
        .card { width: min(960px, 100%); display:grid; grid-template-columns: 1.1fr 0.9fr; gap:24px; background: color-mix(in srgb, var(--card), transparent 10%); border:1px solid rgba(255,255,255,.08); border-radius:18px; overflow:hidden; box-shadow: 0 30px 80px rgba(0,0,0,.45); }
        .left { padding:28px; }
        .right { padding:28px; background: rgba(255,255,255,.03); border-left:1px solid rgba(255,255,255,.08); }
        h1 { margin:0 0 10px; font-size:28px; letter-spacing:.2px; }
        p { margin:0 0 18px; color:var(--muted); line-height:1.5; }
        .row { display:flex; gap:12px; flex-wrap:wrap; }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:10px; border-radius:12px; padding:12px 14px; text-decoration:none; font-weight:600; border:1px solid rgba(255,255,255,.10); color:var(--text); background: rgba(255,255,255,.04); cursor:pointer; }
        .btn:hover { background: rgba(255,255,255,.07); }
        .btn.primary { background: rgba(94,234,212,.16); border-color: rgba(94,234,212,.28); }
        .btn.primary:hover { background: rgba(94,234,212,.22); }
        .btn.google { background: rgba(255,255,255,.06); }
        .divider { height:1px; background: rgba(255,255,255,.08); margin:18px 0; }
        label { display:block; font-size:13px; color:var(--muted); margin:12px 0 6px; }
        input { width:100%; padding:12px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background: rgba(0,0,0,.18); color:var(--text); outline:none; }
        input:focus { border-color: rgba(94,234,212,.45); box-shadow: 0 0 0 3px rgba(94,234,212,.12); }
        .error { margin-top:10px; color:var(--danger); font-weight:600; }
        @media (max-width: 900px) { .card{ grid-template-columns: 1fr; } .right{ border-left:none; border-top:1px solid rgba(255,255,255,.08);} }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <div class="left">
            <h1>Đăng nhập TicketRush</h1>
            <p>Đăng nhập user nội bộ bằng username/email + password.</p>

            <div class="row">
                <a class="btn" th:href="@{/logout}">
                    Logout
                </a>
            </div>

            <div class="divider"></div>

            <p><b>Gợi ý:</b> OAuth2/Keycloak hiện đang tắt bằng `app.security.oauth2.enabled=false`.</p>
        </div>

        <div class="right">
            <h2 style="margin:0 0 10px; font-size:18px;">User nội bộ</h2>
            <p>Nhập <b>username hoặc email</b> và password.</p>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <label for="identifier">Username / Email</label>
                <input id="identifier" name="identifier" autocomplete="username" placeholder="vd: vanquyen hoặc vanquyen@gmail.com" required/>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required/>

                <div style="margin-top:14px;">
                    <button class="btn primary" type="submit" style="width:100%;">Đăng nhập</button>
                </div>

                <div class="error" th:if="${param.error}">
                    Sai username/email hoặc password.
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
