spring.application.name=ticketRush
server.port=8082
# Override bang env vars neu may cua ban dung config khac:
# - DB_URL
# - DB_USERNAME
# - DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/testrush}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
app.frontend.url=http://localhost:5173
app.security.oauth2.enabled=false
# Hibernate (nếu dùng JPA)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
# Dat san dialect de log khong bi them loi "Unable to determine Dialect"
# khi DB credentials sai hoac MySQL chua chay.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Keycloak / OAuth2
# registration.ticketRush.* = OAuth2 client config Spring dùng để kết nối với Keycloak.
# Tên "ticketRush" phải khớp với /oauth2/authorization/ticketRush và callback /login/oauth2/code/ticketRush
spring.security.oauth2.client.registration.ticketRush.client-id=ticketRush
spring.security.oauth2.client.registration.ticketRush.client-secret=HIb3ONXifdqpwnljMLLzG3uehLRVjTav
spring.security.oauth2.client.registration.ticketRush.scope=openid,profile,roles,email
spring.security.oauth2.client.registration.ticketRush.authorization-grant-type=authorization_code
# Sau khi login xong ở Keycloak, người dùng sẽ được redirect về callback mặc định của Spring Security.
spring.security.oauth2.client.registration.ticketRush.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
# issuer-uri trỏ đến realm Keycloak; Spring dùng nó để tự lấy metadata OIDC và public keys verify token.
spring.security.oauth2.client.provider.ticketRush.issuer-uri=http://localhost:8080/realms/TicketRush

# Swagger / OpenAPI
# Swagger UI: http://localhost:8082/swagger-ui/index.html
# OpenAPI JSON: http://localhost:8082/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
# Sắp xếp các endpoint theo method (GET, POST, PUT, DELETE)
springdoc.swagger-ui.operations-sorter=method
# Sắp xếp các tag alphabetically
springdoc.swagger-ui.tags-sorter=alpha
# Tự động mở rộng tag đầu tiên
springdoc.swagger-ui.doc-expansion=list
# Hiển thị request duration
springdoc.swagger-ui.display-request-duration=true
# Bật Try it out mặc định
springdoc.swagger-ui.try-it-out-enabled=true
# Bao gồm Actuator endpoints (nếu có)
springdoc.show-actuator=false
